<!--
CSS Margins
The CSS margin properties are used to create space around elements, outside of any defined borders.

Margins define the distance between an element's border and the surrounding elements.

With CSS, you have full control over the margins. CSS has properties for setting the
 margin for each individual side of an element (top, right, bottom, and left),
 and a shorthand property for setting all the margin properties in one declaration.
-->
<!DOCTYPE html>
<html>
<head>
    <title>CSS Margin Example</title>

    <!-- Connects the CSS file to the HTML page -->
    <link rel="stylesheet" href="day4margins.css">
</head>
<body>

    <h1>CSS Margin Example</h1>

    <p >
        This paragraph demonstrates the CSS margin property.
        Margins create space outside the border of an element.
    </p>

</body>
</html>
