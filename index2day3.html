<!DOCTYPE html>
<html>
<head>
    <title>Border Style Example</title>
    <link rel="stylesheet" href="style3day3.css">
</head>
<body>

    <h1 class="solid">Solid Border</h1>
    <h1 class="dotted">Dotted Border</h1>
    <h1 class="dashed">Dashed Border</h1>
    <h1 class="double">Double Border</h1>
    <h1 class="groove">Groove Border</h1>
    <h1 class="ridge">Ridge Border</h1>
    <h1 class="inset">Inset Border</h1>
    <h1 class="outset">Outset Border</h1>

    <p class="one">Solid border with 5px width</p>
    <p class="two">Solid border with medium width</p>
    <p class="three">Dotted border with 2px width</p>
    <p class="four">Dotted border with thick width</p>

</body>
</html>
